name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Go dependencies
        run: go mod download
      - name: Lint Go
        run: make lint
      - name: Test Go
        run: go test ./...
      - name: Install Python deps
        run: pip install -r tools/rulesgen/requirements.txt
      - name: Test Python
        run: cd tools/rulesgen && python -m pytest tests/ -v

  docker:
    needs: test
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build Docker image
        run: docker build -t mago:${{ github.ref_name }} .
      - name: Save artifact
        run: docker save mago:${{ github.ref_name }} | gzip > mago-image.tar.gz
      - uses: actions/upload-artifact@v3
        with:
          name: mago-docker
          path: mago-image.tar.gz